name: Build Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Build 1: Standard firmware ──
      - name: Build Standard Firmware
        run: docker compose run --rm dev ./utils/build.sh --aq-first --embedded

      - name: Save Standard Firmware
        run: |
          sudo chown -R $USER:$USER .
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y-%m-%d')
          mkdir -p firmware_output
          cp zephyrapp/game/utils/cache/standard.bin "firmware_output/ucrit-firmware-${DATE}-${SHORT_SHA}.bin"
          echo "Saved: ucrit-firmware-${DATE}-${SHORT_SHA}.bin"
          ls -la firmware_output/

      # ── Build 2: Bootloader update firmware (one-time bootloader update image) ──
      # Removes the embedded build dir to force cmake reconfiguration with --bootloader.
      # The desktop build dir is left as-is (harmless no-op rebuild).
      - name: Build Bootloader Update Firmware
        run: docker compose run --rm dev bash -c "rm -rf ../build && ./utils/build.sh --aq-first --embedded --bootloader"

      - name: Save Bootloader Update Firmware
        run: |
          sudo chown -R $USER:$USER .
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y-%m-%d')
          cp zephyrapp/game/utils/cache/standard.bin "firmware_output/ucrit-bootloader-update-${DATE}-${SHORT_SHA}.bin"
          echo "Saved: ucrit-bootloader-update-${DATE}-${SHORT_SHA}.bin"
          ls -la firmware_output/

      # ── Upload both artifacts ──
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ucrit-firmware
          path: firmware_output/*.bin
